syntax = "proto3";

package email;

service EmailService {
  rpc SendEmail (SendEmailRequest) returns (SendEmailResponse);
}

message SendEmailRequest {
  string to = 1;
  string subject = 2;
  string body_html = 3;
  string body_text = 4;
  string template = 5;
}

message SendEmailResponse {
  bool success = 1;
  string message = 2;
}
