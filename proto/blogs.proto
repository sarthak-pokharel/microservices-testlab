syntax = "proto3";

package blogs;

service BlogsService {
  rpc CreateBlog (CreateBlogRequest) returns (BlogResponse);
  rpc GetBlog (GetBlogRequest) returns (BlogResponse);
  rpc ListBlogs (ListBlogsRequest) returns (ListBlogsResponse);
  rpc UpdateBlog (UpdateBlogRequest) returns (BlogResponse);
  rpc DeleteBlog (DeleteBlogRequest) returns (DeleteBlogResponse);
}

message CreateBlogRequest {
  string author_id = 1;
  string title = 2;
  string content = 3;
  string media_url = 4;
  string type = 5;
}

message GetBlogRequest {
  string blog_id = 1;
}

message ListBlogsRequest {
  string author_id = 1;
  int32 page = 2;
  int32 limit = 3;
  string type = 4;
}

message UpdateBlogRequest {
  string blog_id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  string media_url = 5;
}

message DeleteBlogRequest {
  string blog_id = 1;
  string author_id = 2;
}

message DeleteBlogResponse {
  bool success = 1;
}

message BlogResponse {
  string blog_id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  string media_url = 5;
  string type = 6;
  string published_at = 7;
}

message ListBlogsResponse {
  repeated BlogResponse blogs = 1;
  int32 total = 2;
}
