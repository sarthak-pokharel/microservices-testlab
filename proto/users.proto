syntax = "proto3";

package users;

service UsersService {
  rpc CreateProfile (CreateProfileRequest) returns (ProfileResponse);
  rpc GetUser (GetUserRequest) returns (ProfileResponse);
  rpc UpdateProfile (UpdateProfileRequest) returns (ProfileResponse);
  rpc Follow (FollowRequest) returns (FollowResponse);
  rpc Unfollow (FollowRequest) returns (FollowResponse);
  rpc GetFollowers (GetFollowersRequest) returns (GetFollowersResponse);
  rpc GetFollowing (GetFollowersRequest) returns (GetFollowersResponse);
}

message CreateProfileRequest {
  string user_id = 1;
  string username = 2;
  string bio = 3;
  string avatar_url = 4;
}

message GetUserRequest {
  string user_id = 1;
}

message UpdateProfileRequest {
  string user_id = 1;
  string username = 2;
  string bio = 3;
  string avatar_url = 4;
}

message FollowRequest {
  string follower_id = 1;
  string following_id = 2;
}

message FollowResponse {
  bool success = 1;
}

message GetFollowersRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetFollowersResponse {
  repeated ProfileResponse users = 1;
  int32 total = 2;
}

message ProfileResponse {
  string user_id = 1;
  string username = 2;
  string bio = 3;
  string avatar_url = 4;
  int32 followers_count = 5;
  int32 following_count = 6;
}
