# k8s/apps/api-gateway.yaml
#
# API Gateway is the only public-facing service.
# It gets a ClusterIP Service (not LoadBalancer directly) — the external
# LoadBalancer is provided by the nginx Ingress controller.
# We give it 2 replicas and a HorizontalPodAutoscaler for UAT load testing.
#
# The gateway needs to reach all 5 gRPC services.
# In Kubernetes, services are reachable by their short name within the same
# namespace, e.g. just "auth-service:5001". We provide the full FQDN for clarity.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: vlogging-uat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: sarthak8317/vlogging-api-gateway:uat
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            # gRPC addresses — k8s DNS resolves service names to ClusterIP
            - name: AUTH_SERVICE_URL
              value: auth-service.vlogging-uat.svc.cluster.local:5001
            - name: USER_SERVICE_URL
              value: user-service.vlogging-uat.svc.cluster.local:5002
            - name: BLOG_SERVICE_URL
              value: blog-service.vlogging-uat.svc.cluster.local:5003
            - name: COMMENT_SERVICE_URL
              value: comment-service.vlogging-uat.svc.cluster.local:5004
            - name: EMAIL_SERVICE_URL
              value: email-service.vlogging-uat.svc.cluster.local:5005
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: REDIS_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: JWT_REFRESH_SECRET
            - name: OTEL_ENDPOINT
              value: http://jaeger.vlogging-uat.svc.cluster.local:4318/v1/traces
          readinessProbe:
            httpGet:
              path: /metrics   # already exposes /metrics — reuse as health check
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: vlogging-uat
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
# HorizontalPodAutoscaler — scales api-gateway between 2 and 5 pods
# when CPU > 70%. Requires metrics-server installed in GKE (it is by default).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: vlogging-uat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
