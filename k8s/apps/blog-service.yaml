# k8s/apps/blog-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-service
  namespace: vlogging-uat
spec:
  replicas: 2   # Blog reads are frequent — 2 replicas for UAT
  selector:
    matchLabels:
      app: blog-service
  template:
    metadata:
      labels:
        app: blog-service
    spec:
      containers:
        - name: blog-service
          image: sarthak8317/vlogging-blog-service:uat
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 5003
            - name: metrics
              containerPort: 9203
          env:
            - name: NODE_ENV
              value: production
            - name: DB_SYNC
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: BLOG_DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: REDIS_URL
            - name: OTEL_ENDPOINT
              value: http://jaeger.vlogging-uat.svc.cluster.local:4318/v1/traces
          readinessProbe:
            tcpSocket:
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: blog-service
  namespace: vlogging-uat
spec:
  selector:
    app: blog-service
  ports:
    - name: grpc
      port: 5003
      targetPort: 5003
    - name: metrics
      port: 9203
      targetPort: 9203
