# k8s/apps/comment-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: vlogging-uat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      containers:
        - name: comment-service
          image: sarthak8317/vlogging-comment-service:uat
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 5004
            - name: metrics
              containerPort: 9204
          env:
            - name: NODE_ENV
              value: production
            - name: DB_SYNC
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: COMMENT_DATABASE_URL
            - name: OTEL_ENDPOINT
              value: http://jaeger.vlogging-uat.svc.cluster.local:4318/v1/traces
          readinessProbe:
            tcpSocket:
              port: 5004
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: comment-service
  namespace: vlogging-uat
spec:
  selector:
    app: comment-service
  ports:
    - name: grpc
      port: 5004
      targetPort: 5004
    - name: metrics
      port: 9204
      targetPort: 9204
