# k8s/apps/auth-service.yaml
#
# Auth service is a gRPC server — it has NO HTTP port.
# It exposes two ports:
#   5001 — gRPC (used by api-gateway to call Register, Login, etc.)
#   9201 — Prometheus metrics sidecar HTTP server (used by Prometheus scraper)
#
# 1 replica is intentional: bcrypt is CPU-bound, scaling horizontally
# is fine but not needed for UAT. HPA can be added later.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: vlogging-uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: sarthak8317/vlogging-auth-service:uat
          imagePullPolicy: Always   # Always pull so new pushes are picked up on pod restart
          ports:
            - name: grpc
              containerPort: 5001
            - name: metrics
              containerPort: 9201
          env:
            - name: NODE_ENV
              value: production
            - name: DB_SYNC
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: AUTH_DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: REDIS_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: JWT_REFRESH_SECRET
            - name: OTEL_ENDPOINT
              value: http://jaeger.vlogging-uat.svc.cluster.local:4318/v1/traces
          readinessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: vlogging-uat
spec:
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 5001
      targetPort: 5001
    - name: metrics
      port: 9201
      targetPort: 9201
