# k8s/apps/user-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: vlogging-uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: sarthak8317/vlogging-user-service:uat
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 5002
            - name: metrics
              containerPort: 9202
          env:
            - name: NODE_ENV
              value: production
            - name: DB_SYNC
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: USER_DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vlogging-secrets
                  key: REDIS_URL
            - name: OTEL_ENDPOINT
              value: http://jaeger.vlogging-uat.svc.cluster.local:4318/v1/traces
          readinessProbe:
            tcpSocket:
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: vlogging-uat
spec:
  selector:
    app: user-service
  ports:
    - name: grpc
      port: 5002
      targetPort: 5002
    - name: metrics
      port: 9202
      targetPort: 9202
