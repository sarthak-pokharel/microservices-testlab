# k8s/infra/redis.yaml
#
# Redis doesn't need persistent storage for our use case (BullMQ jobs are
# ephemeral — if Redis restarts, in-flight email jobs are lost but that's
# acceptable for UAT). Using a Deployment instead of StatefulSet.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vlogging-uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ['redis-cli', 'ping']
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vlogging-uat
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
